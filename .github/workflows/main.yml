name: Build Islamic App APK

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Download Gradle Wrapper JAR
        run: |
          mkdir -p gradle/wrapper
          curl -L -o gradle/wrapper/gradle-wrapper.jar \
            https://github.com/gradle/gradle/raw/v8.4.0/gradle/wrapper/gradle-wrapper.jar
          chmod +x gradlew

      - name: Create athan audio placeholder
        run: |
          mkdir -p app/src/main/res/raw
          dd if=/dev/zero bs=1024 count=50 of=app/src/main/res/raw/athan_default.mp3

      - name: Generate Keystore
        run: |
          keytool -genkeypair \
            -alias mohamedabdulazim \
            -keyalg RSA -keysize 2048 \
            -validity 9125 \
            -keystore islamic.jks \
            -storepass islamic123 \
            -keypass islamic123 \
            -dname "CN=MohamedAbdulAzim,O=Islamic,C=EG" \
            -noprompt

      - name: Build APK
        run: |
          ./gradlew assembleRelease \
            -Pandroid.injected.signing.store.file=${{ github.workspace }}/islamic.jks \
            -Pandroid.injected.signing.store.password=islamic123 \
            -Pandroid.injected.signing.key.alias=mohamedabdulazim \
            -Pandroid.injected.signing.key.password=islamic123

      - name: Create Release with APK
        uses: softprops/action-gh-release@v2
        with:
          tag_name: "build-${{ github.run_number }}"
          name: "مؤذن محمد عبد العظيم - إصدار ${{ github.run_number }}"
          files: app/build/outputs/apk/release/*.apk
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
