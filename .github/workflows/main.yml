name: Build Islamic App APK

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    name: Build APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Download Gradle Wrapper JAR
        run: |
          mkdir -p gradle/wrapper
          curl -L -o gradle/wrapper/gradle-wrapper.jar \
            https://github.com/gradle/gradle/raw/v8.4.0/gradle/wrapper/gradle-wrapper.jar
          chmod +x gradlew

      - name: Create athan audio placeholder
        run: |
          mkdir -p app/src/main/res/raw
          python3 -c "
# Minimal silent MP3 placeholder
frame = bytes([0xFF,0xE3,0x18,0xC4,0x00,0x00,0x00,0x03,0x48,0x00,0x00,0x00,0x00,0x4C,0x41,0x4D,0x45,0x33,0x2E,0x31,0x30,0x30]) + bytes(396)
with open('app/src/main/res/raw/athan_default.mp3','wb') as f:
    [f.write(frame) for _ in range(50)]
print('Created athan_default.mp3')
"

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ hashFiles('**/*.gradle*','**/gradle-wrapper.properties') }}
          restore-keys: gradle-

      - name: Build Debug APK
        run: ./gradlew assembleDebug --no-daemon --stacktrace

      - name: Upload Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: محمد-عبدالعظيم-الطويل-الاسلامي-debug
          path: app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30

      - name: Build Release APK
        run: ./gradlew assembleRelease --no-daemon
        continue-on-error: true

      - name: Upload Release APK
        uses: actions/upload-artifact@v4
        with:
          name: محمد-عبدالعظيم-الطويل-الاسلامي-release
          path: app/build/outputs/apk/release/app-release-unsigned.apk
          retention-days: 30
        continue-on-error: true
